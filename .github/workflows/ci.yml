name: Hubora CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:static
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [desktop-chromium, tablet-chromium, android-chromium]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:static
      - run: npx playwright install --with-deps chromium
      - name: Install authorized E2E media generator
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm run build
      - run: npm run test:e2e -- --project=${{ matrix.project }}
